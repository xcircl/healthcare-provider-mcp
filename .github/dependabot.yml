version: 2
updates:
  # npm dependencies across the workspace root (covers both packages).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development

  # Keep the GitHub Actions in CI up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
